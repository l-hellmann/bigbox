<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>head2box</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050507;
        }
        /* macroquad/miniquad binds to a canvas with this exact id. */
        canvas {
            display: block;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            /* Crisp boxy-3D edges rather than blurry upscaling. */
            image-rendering: pixelated;
        }
        canvas:focus { outline: none; }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5b5b66;
            font: 14px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
            letter-spacing: .08em;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">loading…</div>
    <!-- Click-to-focus so keyboard input reaches the canvas immediately. -->
    <canvas id="glcanvas" tabindex="1"></canvas>

    <script src="mq_js_bundle.js"></script>
    <!-- quad-url lets the wasm read run config (?seed=&level=) from the URL.
         It needs sapp_jsutils' global js_object/get_js_object helpers, which the
         bundle keeps IIFE-private — so load the standalone sapp_jsutils.js to
         expose them. Both register miniquad plugins; order: after the bundle,
         before load(). -->
    <script src="sapp_jsutils.js"></script>
    <script src="quad-url.js"></script>
    <!-- quad-gamepad: twin-stick gamepad via the browser Gamepad API as plain
         numbers (no wasm-bindgen). gilrs is native-only; this is the web path. -->
    <script src="quad-gamepad.js"></script>
    <script>
        // macroquad's loader. No wasm-bindgen — the bundle provides the raw
        // imports the wasm expects. `load` fetches + instantiates the module
        // and starts the run loop. Kept in its own <script> so nothing else can
        // prevent it running.
        load("head2box.wasm");
    </script>
    <script>
        // Drop the loading hint once miniquad has sized the canvas. Scoped in an
        // IIFE with a non-colliding name — the bundle already owns a global
        // `canvas`, and redeclaring it is a parse error that kills the script.
        (function () {
            const cv = document.getElementById("glcanvas");
            const t0 = performance.now();
            const tick = () => {
                if (cv.width > 1 || performance.now() - t0 > 4000) {
                    const el = document.getElementById("loading");
                    if (el) el.remove();
                    cv.focus();
                } else {
                    requestAnimationFrame(tick);
                }
            };
            requestAnimationFrame(tick);
        })();
    </script>
</body>
</html>
