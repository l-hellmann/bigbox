[package]
name = "head2box-game"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Runtime layer for head2box — macroquad window, input, render loop."

[lib]
name = "h2b_game"

[[bin]]
name = "h2b-game"
path = "src/main.rs"

[dependencies]
head2box-core = { path = "../core" }
head2box-content = { path = "../content" }
head2box-procgen = { path = "../procgen" }
rand = { workspace = true }
macroquad = { workspace = true }
# Debug-only immediate-mode tuning panel + RON tunable export/import. All
# optional so release builds don't compile (or ship) any of it. Enable with
# `--features debug`.
egui-macroquad = { version = "0.17", optional = true }
serde = { workspace = true, optional = true }
ron = { workspace = true, optional = true }

[features]
# Compiles the in-game debug/tuning overlay (egui) and tunable export/import.
# Off by default → stripped from a normal `cargo build --release`.
debug = ["dep:egui-macroquad", "dep:serde", "dep:ron"]
